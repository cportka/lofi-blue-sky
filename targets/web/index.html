<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>lofi blue sky</title>
    <meta
      name="description"
      content="A procedurally generated lofi glitch-sky, synthesized entirely in a fragment shader from a hash."
    />
    <style>
      :root {
        --ink: #ece6d6;
        --muted: #a9a294;
        --good: #86c98b;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0a12;
        overflow: hidden;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        color: var(--ink);
      }
      #sky {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        cursor: pointer;
      }
      #hud {
        position: fixed;
        left: 16px;
        bottom: 16px;
        width: min(320px, 82vw);
        padding: 14px 16px;
        border-radius: 12px;
        background: rgba(11, 10, 18, 0.5);
        backdrop-filter: blur(9px) saturate(1.1);
        -webkit-backdrop-filter: blur(9px) saturate(1.1);
        border: 1px solid rgba(236, 230, 214, 0.12);
        font-size: 12px;
        line-height: 1.5;
        transition: opacity 0.18s ease, transform 0.18s ease;
      }
      body.hud-hidden #hud {
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
      }
      #titlebar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      #brand {
        font-size: 13px;
        letter-spacing: 0.04em;
        opacity: 0.95;
      }
      #nav button {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 13px;
        padding: 2px 5px;
        border-radius: 6px;
      }
      #nav button:hover:not(:disabled) {
        color: var(--ink);
        background: rgba(236, 230, 214, 0.12);
      }
      #nav button:disabled {
        opacity: 0.3;
        cursor: default;
      }
      #engines {
        display: flex;
        gap: 6px;
        margin-bottom: 10px;
      }
      .chip {
        font: inherit;
        font-size: 11px;
        color: var(--muted);
        background: rgba(236, 230, 214, 0.05);
        border: 1px solid rgba(236, 230, 214, 0.14);
        border-radius: 999px;
        padding: 3px 11px;
        cursor: pointer;
      }
      .chip:hover {
        color: var(--ink);
      }
      .chip[aria-selected="true"] {
        color: #0b0a12;
        background: var(--ink);
        border-color: var(--ink);
      }
      #feats {
        display: flex;
        flex-direction: column;
        gap: 1px;
        margin-bottom: 12px;
      }
      .feat {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        width: 100%;
        text-align: left;
        font: inherit;
        color: var(--ink);
        background: none;
        border: none;
        border-radius: 6px;
        padding: 2px 6px;
        cursor: pointer;
      }
      .feat:hover {
        background: rgba(236, 230, 214, 0.1);
      }
      .feat .k {
        color: var(--muted);
      }
      .feat:hover .k::after {
        content: " ⟳";
        color: rgba(236, 230, 214, 0.5);
      }
      .feat .v {
        text-align: right;
      }
      .seedrow,
      .btns {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      input,
      button.act {
        font: inherit;
        color: var(--ink);
        background: rgba(236, 230, 214, 0.06);
        border: 1px solid rgba(236, 230, 214, 0.16);
        border-radius: 8px;
        padding: 6px 10px;
      }
      #seed {
        flex: 1;
        min-width: 0;
        font-size: 10px;
        color: var(--muted);
        text-overflow: ellipsis;
      }
      button.act {
        cursor: pointer;
      }
      button.act:hover:not(:disabled) {
        background: rgba(236, 230, 214, 0.14);
      }
      button.act:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #copy {
        width: 34px;
        display: grid;
        place-items: center;
        padding: 6px 0;
      }
      #copy.ok {
        color: var(--good);
        border-color: var(--good);
      }
      .btns .act {
        flex: 1;
      }
    </style>
    <!-- FX_SNIPPET: unused for the web target -->
  </head>
  <body>
    <canvas id="sky"></canvas>
    <div id="hud">
      <div id="titlebar">
        <span id="brand">lofi&nbsp;blue&nbsp;sky</span>
        <span id="nav">
          <button id="back" title="previous (undo)">◀</button>
          <button id="fwd" title="next (redo)">▶</button>
        </span>
      </div>
      <div id="engines" title="switch sky engine"></div>
      <div id="feats" title="click an attribute to reshuffle just that one"></div>
      <div class="seedrow">
        <input id="seed" spellcheck="false" autocomplete="off" placeholder="hash or g:… token" />
        <button id="copy" class="act" title="copy seed">⧉</button>
      </div>
      <div class="btns">
        <button id="rand" class="act">↻ new sky</button>
        <button id="png" class="act" title="save this frame">png</button>
        <button id="webm" class="act" title="record one full loop as webm">loop</button>
      </div>
    </div>
    <!-- INLINE_SCRIPT: the engine is inlined here by targets/web/build.mjs -->
  </body>
</html>
