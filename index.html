float hash11(float p) {
  p = fract(p * 0.1031);
  p *= p + 33.33;
  p *= p + p;
  return fract(p);
}

float hash21(vec2 p) {

  p3 += dot(p3, p3.yzx + 33.33);
  return fract((p3.x + p3.y) * p3.z);

// --- colour utilities -----------------------------------------------------------------------
float luma(vec3 c) { return dot(c, vec3(0.299, 0.587, 0.114)); }

vec3 posterize(vec3 c, float levels) {
  return floor(c * levels + 0.5) / levels;

// 4x4 ordered (Bayer) dither, returns a threshold in [-0.5, 0.5].

uniform vec2  uResolution;

  bool clean  = uClean > 0.5;

  float rows = blocks ? max(1.0, floor(uBlocksN + 0.5)) : max(1.0, floor(uBands + 0.5));
  float cols = blocks ? max(1.0, floor(uBlocksN + 0.5)) : max(1.0, floor(uHbands + 0.5));
